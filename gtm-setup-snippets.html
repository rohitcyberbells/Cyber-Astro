<!-- Calendly Global Event Listener (Sends data to Google Analytics) -->
<script>
    window.addEventListener('message', function (e) {
      if (!e.data || typeof e.data !== 'object') return;
      if (!e.origin.includes('calendly.com')) return;
      var event = e.data.event;
      if (!event) return;

      if (event === 'calendly.event_type_viewed') {
        gtag('event', 'invitee_event_type_page', {
          event_category: 'Booking',
          event_label: 'Strategy Session – Page Viewed'
        });
      }
      if (event === 'calendly.date_and_time_selected') {
        gtag('event', 'invitee_select_time', {
          event_category: 'Booking',
          event_label: 'Strategy Session – Time Selected'
        });
      }
      if (event === 'calendly.event_scheduled') {
        gtag('event', 'invitee_meeting_scheduled', {
          event_category: 'Booking',
          event_label: 'Strategy Session – Confirmed'
        });
      }
    });
</script>
